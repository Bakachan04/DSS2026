# Nginx Deployment Security Hardening Configuration Snippet
# Integrate these header directives inside your server block (e.g., in /etc/nginx/sites-available/default)

server {
    listen 80;
    server_name yourdomain.com;
    
    # Root folder containing DSS static production application files
    root /var/www/html/app;
    index index.html;

    location / {
        try_files $uri $uri/ =404;

        # 1. Content Security Policy (CSP)
        # Allows self-hosted assets, scripts, dynamic style manipulation, and Google Maps widgets.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.google.com https://*.gstatic.com; frame-src 'self' https://www.google.com; font-src 'self'; object-src 'none'; base-uri 'self';" always;

        # 2. Prevent Clickjacking
        add_header X-Frame-Options "SAMEORIGIN" always;

        # 3. Prevent MIME-Type Sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # 4. Control Referrer Information
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 5. Restrict Device APIs (Permissions Policy)
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # 6. HTTP Strict Transport Security (HSTS)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }
}
